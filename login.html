<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Comfort Mebel | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 h-screen flex items-center justify-center">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-96 border border-slate-100">
        <h2 class="text-3xl font-black text-slate-800 mb-8 text-center uppercase tracking-tighter">Admin Kirish</h2>
        <form id="loginForm" class="space-y-5">
            <input type="email" id="email" placeholder="Email" class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 transition font-semibold" required>
            <input type="password" id="password" placeholder="Parol" class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 focus:ring-amber-500 transition font-semibold" required>
            <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black hover:bg-amber-600 transition shadow-lg uppercase tracking-widest text-sm">Kirish</button>
        </form>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('https://7da933a18628966e.mokky.dev/auth', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Muvaffaqiyatli kirilsa, tokenni saqlaymiz
                    localStorage.setItem('token', data.token);
                    window.location.href = 'admin.html';
                } else {
                    alert("Email yoki parol xato!");
                }
            } catch (err) {
                alert("Server bilan aloqa uzildi!");
            }
        });
    </script>
</body>
</html>
