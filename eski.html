                nomi: document.getElementById('mebelNomi').value,
                narxi: document.getElementById('mebelNarxi').value,
                rasm: document.getElementById('mebelRasm').value,
                category: document.getElementById('mebelCategory').value // Kategoriya qo'shildi
            };

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${TOKEN}`
                    },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    alert("Mebel muvaffaqiyatli saqlandi!");
                    document.getElementById('mebelForm').reset();

                    alert("Sizda ruxsat yo'q. Iltimos qayta login qiling.");

                } else {
                    alert("Xatolik yuz berdi!");

            } catch (err) {

                btn.innerText = originalText;
                btn.disabled = false;
            }
        });
