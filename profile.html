<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Profilim | Comfort Mebel</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-white shadow-md p-4 flex justify-between items-center">
        <a href="/" class="text-2xl font-bold text-orange-500">Comfort Mebel</a>
        <a href="/" class="text-gray-600 hover:text-orange-500">Bosh sahifaga qaytish</a>
    </nav>

    <div class="max-w-4xl mx-auto mt-10 p-6 bg-white rounded-lg shadow-lg">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Foydalanuvchilar Kabineti</h2>

        <div id="login-section" class="mb-8 p-4 bg-orange-50 border border-orange-200 rounded-lg">
            <p class="text-sm text-gray-600 mb-2">Buyurtmalaringizni ko'rish uchun telefon raqamingizni kiriting:</p>
            <div class="flex gap-2">
                <input type="text" id="user-phone" placeholder="+998901234567" class="border p-2 rounded w-full max-w-xs focus:outline-orange-500">
                <button onclick="buyurtmalarniYuklash()" class="bg-orange-500 text-white px-4 py-2 rounded hover:bg-orange-600">Tekshirish</button>
            </div>
        </div>

        <div>
            <h3 class="text-xl font-semibold text-gray-700 mb-4">Mening Buyurtmalarim</h3>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-200 text-gray-700">
                            <th class="p-3 border">Sana</th>
                            <th class="p-3 border">Mahsulot</th>
                            <th class="p-3 border">Narxi</th>
                            <th class="p-3 border">Holati (Status)</th>
                        </tr>
                    </thead>
                    <tbody id="orders-table-body">
                        <tr>
                            <td colspan="4" class="p-4 text-center text-gray-500">Telefon raqamingizni kiritib "Tekshirish" tugmasini bosing.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        function buyurtmalarniYuklash() {
            const phone = document.getElementById('user-phone').value.trim();
            if(!phone) {
                alert("Iltimos, telefon raqamni kiriting!");
                return;
            }

            fetch(`/api/my-orders/${encodeURIComponent(phone)}`)
                .then(res => res.json())
                .then(orders => {
                    const tbody = document.getElementById('orders-table-body');
                    tbody.innerHTML = '';

                    if(orders.length === 0) {
                        tbody.innerHTML = `<tr><td colspan="4" class="p-4 text-center text-red-500">Bu raqamga bog'liq buyurtma topilmadi.</td></tr>`;
                        return;
                    }

                    orders.forEach(order => {
                        // Status rangini belgilash
                        let statusColor = "bg-yellow-100 text-yellow-800";
                        if(order.status === "Yetkazilmoqda") statusColor = "bg-blue-100 text-blue-800";
                        if(order.status === "Tugallandi") statusColor = "bg-green-100 text-green-800";

                        tbody.innerHTML += `
                            <tr class="hover:bg-gray-50">
                                <td class="p-3 border">${order.sana}</td>
                                <td class="p-3 border font-semibold">${order.mebelNomi}</td>
                                <td class="p-3 border text-orange-600 font-bold">${order.narxi} UZS</td>
                                <td class="p-3 border">
                                    <span class="px-2 py-1 rounded text-xs font-semibold ${statusColor}">${order.status}</span>
                                </td>
                            </tr>
                        `;
                    });
                })
                .catch(err => console.error("Xatolik:", err));
        }
    </script>
</body>
</html>
