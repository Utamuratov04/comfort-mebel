<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comfort Mebel | Premium To'plamlar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        html { scroll-behavior: smooth; }
        body { font-family: 'Poppins', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }

        .filter-btn.active {
            background-color: #d97706;
            color: white;
            box-shadow: 0 10px 20px -5px rgba(217, 119, 6, 0.4);
        }
    </style>
</head>
<body class="bg-slate-50 overflow-x-hidden text-slate-900">

        <div class="text-2xl font-black tracking-tighter text-slate-800 flex items-center group cursor-pointer">

            COMFORT <span class="text-amber-600 italic ml-1">MEBEL</span>
        </div>

        <div class="hidden lg:flex items-center space-x-10 font-bold text-[12px] uppercase tracking-[0.2em] text-slate-600">
            <a href="#asosiy" class="hover:text-amber-600 transition-colors">Asosiy</a>
            <a href="#katalog" class="hover:text-amber-600 transition-colors">Katalog</a>
            <a href="#xizmatlar" class="hover:text-amber-600 transition-colors">Xizmatlar</a>
            <a href="#aloqa" class="hover:text-amber-600 transition-colors">Bog'lanish</a>
        </div>

        <div class="flex items-center space-x-4">
            <button onclick="openModal()" class="flex items-center space-x-2 bg-slate-900 text-white px-6 py-3 rounded-full hover:bg-amber-600 transition-all shadow-xl active:scale-95">
                <i class="fas fa-phone-alt text-[10px]"></i>
                <span class="text-[10px] font-black uppercase tracking-widest">Buyurtma</span>
            </button>
        </div>
    </div>
</nav>

<section id="asosiy" class="relative min-h-screen flex items-center overflow-hidden pt-20">
    <div id="hero-slider" class="absolute inset-0 z-0">

        <div class="absolute inset-0 transition-opacity duration-1000 opacity-0 slider-img"><img src="https://images.unsplash.com/photo-1524758631624-e2822e304c36?q=80&w=2000" class="w-full h-full object-cover"></div>
        <div class="absolute inset-0 bg-black/45"></div>
    </div>

            </div>

                Sizning <span class="text-amber-500 italic">Comfort</span>ingiz <br> bizning maqsadimiz.

            <div class="flex flex-wrap gap-4">

                <button onclick="openModal()" class="bg-white/10 hover:bg-white/20 backdrop-blur-md border border-white/20 px-10 py-5 rounded-2xl text-xs font-black uppercase tracking-widest transition-all">Bog'lanish</button>
            </div>
        </div>
    </div>
    <div id="slider-dots" class="absolute bottom-10 right-10 flex space-x-2 z-20"></div>
</section>

<section id="katalog" class="py-24 bg-white overflow-hidden">
    <div class="container mx-auto px-6">
        <div class="flex flex-col md:flex-row justify-between items-end mb-16" data-aos="fade-up">
            <div class="max-w-2xl text-center md:text-left">
                <h2 class="text-amber-500 text-[11px] font-black uppercase tracking-[0.4em] mb-4 italic">Exclusive Catalog</h2>
                <h3 class="text-4xl md:text-5xl font-black text-slate-900 leading-tight">Mebellar <span class="text-amber-500">To'plami</span></h3>
            </div>
            <div class="flex flex-wrap gap-2 mt-8 md:mt-0 justify-center">
                <button onclick="filterMebellar('top')" class="filter-btn active px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all border border-gray-100">Top</button>
                <button onclick="filterMebellar('oshxona')" class="filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all border border-gray-100 hover:border-amber-500">Oshxona</button>
                <button onclick="filterMebellar('yotoqxona')" class="filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all border border-gray-100 hover:border-amber-500">Yotoqxona</button>
                <button onclick="filterMebellar('mehmonxona')" class="filter-btn px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition-all border border-gray-100 hover:border-amber-500">Mehmonxona</button>
            </div>
        </div>
        <div id="top-mebellar-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10 min-h-[400px]"></div>
    </div>
</section>

<div id="contactModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-opacity duration-300" style="opacity: 0;">
    <div class="bg-white w-full max-w-[420px] rounded-[2.5rem] shadow-2xl relative max-h-[90vh] overflow-y-auto animate-modal">
        <button onclick="closeModal()" class="absolute top-6 right-6 w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center hover:bg-amber-500 hover:text-white transition-all"><i class="fas fa-times"></i></button>
        <div class="p-8 md:p-10">
            <h2 class="text-2xl font-black text-slate-800 mb-2">Bog'lanish</h2>
            <p class="text-gray-500 text-xs font-medium mb-8">Ma'lumotlaringizni qoldiring, biz bog'lanamiz.</p>
            
            <form id="feedbackForm" class="space-y-4">
                <input type="text" id="msgName" placeholder="Ismingiz" required class="w-full bg-gray-50 border border-gray-100 px-5 py-4 rounded-2xl focus:outline-none focus:border-amber-500 focus:bg-white text-sm">
                <input type="tel" id="msgPhone" value="+998" required class="w-full bg-gray-50 border border-gray-100 px-5 py-4 rounded-2xl focus:outline-none focus:border-amber-500 focus:bg-white text-sm">
                <textarea id="msgText" placeholder="Xabar..." rows="3" class="w-full bg-gray-50 border border-gray-100 px-5 py-4 rounded-2xl focus:outline-none focus:border-amber-500 focus:bg-white text-sm resize-none"></textarea>
                
                <button type="submit" id="submitBtn" class="w-full bg-amber-500 hover:bg-amber-600 text-white font-black py-5 rounded-2xl transition-all shadow-xl shadow-amber-500/20 uppercase tracking-widest text-[10px]">
                    <span id="btnText">Xabar yuborish</span>
                </button>
            </form>
        </div>
    </div>
</div>

<footer class="bg-white py-12 text-center border-t border-gray-100">
    <p class="text-gray-400 font-medium">&copy; 2026 COMFORT MEBEL. Barcha huquqlar himoyalangan.</p>
</footer>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 800, once: true });

    // Slider funksiyalari
    const sliderImages = document.querySelectorAll('.slider-img');
    const dotsBox = document.getElementById('slider-dots');
    let currentIdx = 0;

    if (sliderImages.length > 0 && dotsBox) {
        sliderImages.forEach((_, i) => {
            const d = document.createElement('div');
            d.className = `h-1 transition-all duration-500 cursor-pointer ${i === 0 ? 'w-8 bg-amber-500' : 'w-4 bg-white/30'}`;
            d.onclick = () => showSlide(i);
            dotsBox.appendChild(d);
        });
    }

    function showSlide(n) {
        if(!sliderImages[currentIdx]) return;
        sliderImages[currentIdx].classList.replace('opacity-100', 'opacity-0');
        dotsBox.children[currentIdx].className = 'h-1 w-4 bg-white/30 transition-all duration-500 cursor-pointer';
        currentIdx = (n + sliderImages.length) % sliderImages.length;
        sliderImages[currentIdx].classList.replace('opacity-0', 'opacity-100');
        dotsBox.children[currentIdx].className = 'h-1 w-8 bg-amber-500 transition-all duration-500 cursor-pointer';
    }
    setInterval(() => { if(sliderImages.length > 0) showSlide(currentIdx + 1) }, 5000);

    // MOKKY.DEV API INTEGRATSIYASI
    const BASE_URL = 'https://7da933a18628966e.mokky.dev';

    async function mebellarniYuklash(category, elementId) {
        const container = document.getElementById(elementId);
        if (!container) return;

        try {
            const res = await fetch(`${BASE_URL}/mebellar?category=${category}`);
            const data = await res.json();
            container.innerHTML = '';

            if (data.length === 0) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-400 py-20 italic">Hozircha mahsulotlar topilmadi...</p>';
                return;
            }

            data.forEach((item, index) => {
                container.innerHTML += `
                    <div class="group relative bg-white rounded-[2.5rem] p-4 shadow-sm hover:shadow-2xl transition-all duration-500 border border-gray-100 flex flex-col h-full" data-aos="fade-up" data-aos-delay="${index * 100}">
                        <div class="relative overflow-hidden rounded-[2rem] aspect-[4/5] mb-6">
                            <img src="${item.rasm}" class="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-110">
                            <div class="absolute inset-0 bg-gradient-to-t from-slate-900/90 via-slate-900/10 to-transparent opacity-0 group-hover:opacity-100 transition-all duration-500 flex items-end p-6">
                                <button onclick="openModal()" class="w-full bg-amber-500 hover:bg-amber-600 text-white py-4 rounded-2xl font-black text-[10px] uppercase tracking-widest">Buyurtma berish</button>
                            </div>
                        </div>
                        <div class="px-2 pb-2">
                            <h4 class="text-xl font-black text-slate-800 mb-1 uppercase">${item.nomi}</h4>
                            <p class="text-amber-600 font-black text-lg">${item.narxi} UZS</p>
                        </div>
                    </div>
                `;
            });
        } catch (error) {
            container.innerHTML = '<p class="text-red-500 text-center col-span-full">Xatolik yuz berdi.</p>';
        }
    }

    // --- TO'G'RILANGAN: XABAR YUBORISH VA TEKSHIRUV ---
    const feedbackForm = document.getElementById('feedbackForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = document.getElementById('btnText');

    if (feedbackForm) {
        feedbackForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // 1. Qiymatlarni olish va bo'shliqqa tekshirish
            const name = document.getElementById('msgName').value.trim();
            const phone = document.getElementById('msgPhone').value.trim();
            const message = document.getElementById('msgText').value.trim();

           // 2. MAJBURIY TEKSHIRUV (Validation)
        // Ism yoki Xabar bo'sh bo'lsa YOKI telefon raqami o'zgartirilmagan bo'lsa (+998 holicha tursa)
        if (!name || !message || phone === "+998" || phone === "") {
            alert("⚠️ Iltimos, barcha maydonlarni to'liq to'ldiring!");
            return; 
        }

        // Telefon raqami uzunligini tekshirish (Masalan: +998901234567 — jami 13 ta belgi)
        if (phone.length < 13) {
            alert("⚠️ Iltimos, telefon raqamingizni to'liq kiriting!");
            return;
        }

            // 3. Tugmani bloklash
            submitBtn.disabled = true;
            btnText.innerText = "Yuborilmoqda...";

            const formData = {
                name: name,
                phone: phone,
                message: message,
                date: new Date().toLocaleString('uz-UZ')
            };

            try {
                const res = await fetch(`${BASE_URL}/messages`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                });

                if (res.ok) {
                    btnText.innerText = "Muvaffaqiyatli!";
                    submitBtn.classList.replace('bg-amber-500', 'bg-green-500');
                    
                    setTimeout(() => {
                        feedbackForm.reset();
                        closeModal();
                        submitBtn.disabled = false;
                        btnText.innerText = "Xabar yuborish";
                        submitBtn.classList.replace('bg-green-500', 'bg-amber-500');
                    }, 2000);
                } else {
                    throw new Error("Xatolik");
                }
            } catch (err) {
                alert("Xatolik yuz berdi. Qayta urinib ko'ring.");
                submitBtn.disabled = false;
                btnText.innerText = "Xabar yuborish";
            }
        });
    }

    function filterMebellar(cat) {
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        if(event) event.target.classList.add('active');
        mebellarniYuklash(cat, 'top-mebellar-list');
    }

    function openModal() {
        const m = document.getElementById('contactModal');
        if(!m) return;
        m.classList.remove('hidden');
        setTimeout(() => m.style.opacity = '1', 10);
        document.body.style.overflow = 'hidden';
    }

    function closeModal() {
        const m = document.getElementById('contactModal');
        if(!m) return;
        m.style.opacity = '0';
        setTimeout(() => {
            m.classList.add('hidden');
            document.body.style.overflow = 'auto';
        }, 300);
    }

    window.onload = () => {
        mebellarniYuklash('top', 'top-mebellar-list');
    }
</script>
</body>
</html>
